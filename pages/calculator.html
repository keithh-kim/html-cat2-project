    <header class="container text-center py-5 my-5">
        <h1 class="display-4 fw-bold mb-3">AWS Cost Estimator</h1>
        <p class="text-secondary lead mx-auto" style="max-width: 600px;">Calculate project budget requirements dynamically before provisioning.</p>
        <main class="container my-5 py-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card bg-secondary bg-opacity-10 border-light border-opacity-10 p-4 shadow">
                    <form id="calculatorForm">
                        
                        <div class="mb-3">
                            <label for="computeTier" class="form-label small fw-bold text-secondary text-uppercase tracking-wider">Elastic Compute (EC2) Tier</label>
                            <select class="form-select bg-dark text-white border-secondary border-opacity-20" id="computeTier">
                                <option value="0">None</option>
                                <option value="15">Micro Tier Instance ($15/mo)</option>
                                <option value="45">Standard Cluster Tier ($45/mo)</option>
                                <option value="120">High-Performance Compute ($120/mo)</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="storageAmount" class="form-label small fw-bold text-secondary text-uppercase tracking-wider d-flex justify-content-between">
                                <span>SSD Storage (S3/EBS)</span>
                                <span class="text-primary fw-bold" id="storageDisplay">50 GB</span>
                            </label>
                            <input type="range" class="form-range" id="storageAmount" min="0" max="1000" step="50" value="50">
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-bold text-secondary text-uppercase tracking-wider d-block">Support Lifecycle Plan</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="supportTier" id="supportBasic" value="0" checked>
                                <label class="form-check-label text-white small" for="supportBasic">Basic (Free)</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="supportTier" id="supportEnterprise" value="49">
                                <label class="form-check-label text-white small" for="supportEnterprise">Enterprise SLA ($49/mo)</label>
                            </div>
                        </div>

                        <hr class="border-light border-opacity-10 my-4">

                        <div class="p-3 bg-dark bg-opacity-50 rounded d-flex justify-content-between align-items-center">
                            <span class="fw-bold small text-uppercase text-secondary">Estimated Total:</span>
                            <span class="h3 fw-bold text-primary mb-0" id="calculatorTotal">$17.50<span class="text-secondary small" style="font-size: 0.9rem;">/mo</span></span>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="../script.js"></script>
